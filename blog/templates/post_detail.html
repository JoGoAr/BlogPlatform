{% extends 'base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<article>
    <h1>{{ post.title }}</h1>
    <p>By {{ post.author }} on {{ post.created_at|date:"F d, Y" }}</p>
    <hr>
    <div>{{ post.content|linebreaks }}</div>
    <hr>
    <a href="{% url 'post_list' %}">← Back to all posts</a>
</article>
{% endblock %}
